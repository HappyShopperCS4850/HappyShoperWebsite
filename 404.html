<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Happy Shopper | Page not found</title>
  <meta name="description" content="The requested Happy Shopper page could not be found.">
  <style>
    :root {
      color-scheme: dark;
      --bg-start: #17001f;
      --bg-mid: #110014;
      --bg-end: #09070d;
      --surface: #1d1225;
      --ink: #f8edf7;
      --muted: #cfb9d1;
      --line: rgba(255, 255, 255, 0.12);
      --accent: #ff12a7;
      --accent-2: #f4c542;
      --radius: 8px;
      --shadow: 0 18px 42px rgba(0, 0, 0, 0.34);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1.5rem;
      color: var(--ink);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
      background:
        linear-gradient(135deg, rgba(255, 18, 167, 0.1) 0%, rgba(255, 18, 167, 0.03) 28%, transparent 28%),
        linear-gradient(315deg, rgba(244, 197, 66, 0.08) 0%, rgba(244, 197, 66, 0.03) 22%, transparent 22%),
        linear-gradient(180deg, var(--bg-start) 0%, var(--bg-mid) 56%, var(--bg-end) 100%);
    }

    main {
      width: min(100%, 560px);
      padding: 2rem;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .eyebrow {
      margin: 0 0 0.75rem;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--accent-2);
    }

    h1 {
      margin: 0;
      font-size: 2.4rem;
      line-height: 1.05;
    }

    p {
      margin: 1rem 0 0;
      color: var(--muted);
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 2.75rem;
      margin-top: 1.5rem;
      padding: 0.75rem 1rem;
      border-radius: var(--radius);
      background: linear-gradient(135deg, var(--accent) 0%, #d90d95 100%);
      color: #fff;
      font-weight: 700;
      text-decoration: none;
    }

    a:focus-visible {
      outline: 3px solid rgba(244, 197, 66, 0.24);
      outline-offset: 2px;
    }
  </style>
</head>

<body>
  <main>
    <p class="eyebrow">404</p>
    <h1>This page does not exist.</h1>
    <p>Return to the home page to continue through the three-page site.</p>
    <a href="index.html">Return home</a>
  </main>
</body>

</html>
